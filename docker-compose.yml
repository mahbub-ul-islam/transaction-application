version: '3.8'

services:
  discovery-service:
    build:
      context: ./discovery-service
    ports:
      - "8761:8761"
    networks:
      - your-network
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: false  # This service is the Eureka server

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"
    networks:
      - your-network
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://discovery-service:8761/eureka/"]
      interval: 10s
      retries: 5
      start_period: 40s
      timeout: 10s

  transaction-service:
    build:
      context: ./transaction-service
    ports:
      - "8082:8081" # Internal port is 8081, but it's mapped to 8082 on the host
    networks:
      - your-network
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mydatabase
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://discovery-service:8761/eureka/"]
      interval: 10s
      retries: 5
      start_period: 40s
      timeout: 10s

  transaction-ui:
    build:
      context: ./transaction-ui
    ports:
      - "4200:80"
    networks:
      - your-network

  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    networks:
      - your-network
    environment:
      POSTGRES_DB: transactions
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    networks:
      - your-network
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db

networks:
  your-network:
    driver: bridge
